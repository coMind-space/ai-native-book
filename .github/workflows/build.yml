name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          SITE_URL: https://comind-space.github.io
          BASE_URL: /ai-native-book/
        run: npm run build

      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Build root domain artifact
        if: github.event_name == 'push'
        env:
          SITE_URL: https://book.my.comind.space
          BASE_URL: /
        run: |
          rm -rf build
          npm run build

      - name: Upload root domain artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: book-root-build
          path: build
          retention-days: 7

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
